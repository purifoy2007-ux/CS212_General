<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container py-4">

        <div class="header text-center mb-4">
            <h1>TASKS</h1>
            <button id="themeToggle" class="btn btn-sm btn-outline-secondary">Toggle Dark Mode</button>
        </div>


        <div class="row mb-4 text-center">
            <div class="col-md-4">
                <div class="task-section">
                    <h5>Pending</h5>
                    <span id="pendingCount" class="badge bg-primary">0</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="task-section">
                    <h5>Completed</h5>
                    <span id="completedCount" class="badge bg-success">0</span>
                </div>
            </div>
            <div class="col-md-4">
                <div class="task-section">
                    <h5>Total</h5>
                    <span id="totalCount" class="badge bg-secondary">0</span>
                </div>
            </div>
        </div>


        <div class="main-content task-section mb-4">
            <h3>Create Task</h3>
            <div class="createTask d-flex flex-column gap-2">
                <input type="text" id="titleField" class="form-control" placeholder="Task Name">
                <input type="text" id="descField" class="form-control" placeholder="Description">
                <input type="date" id="deadlineField" class="form-control">
                <input type="number" id="priorityField" class="form-control" placeholder="Priority (1 = High)">
                <button id="submitTask" class="add-task-btn">Add Task</button>
            </div>
        </div>


        <div class="task-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Current Tasks</h3>
                <button id="sortDateBtn" class="status-btn">Sort by Date</button>
            </div>
            <div id="currTasks"></div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
