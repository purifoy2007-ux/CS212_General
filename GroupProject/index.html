<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Task Manager</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff; 
            --banner-color: #a9c5e8;
            --accent-btn: #fab1e7;
            --text-color: #000000;
            --section-bg: rgba(255, 255, 255, 0.3);
        }

        body.dark-mode {
            --bg-color: #2c2c2c; 
            --banner-color: #496080;
            --accent-btn: #c452a6;
            --text-color: #ffffff;
            --section-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease; 
            margin: 0;
            padding: 20px;
        }

        .header, .createTask, .footer {
            background: var(--section-bg);
            border: 4px solid var(--text-color);
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .header { background-color: var(--banner-color); }

        input {
            display: block;
            width: 90%;
            margin: 10px auto;
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            border: 3px solid var(--text-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 10px;
        }

        #submitTask, .mode-toggle {
            background-color: var(--accent-btn);
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            border: 3px solid var(--text-color);
            cursor: pointer;
            color: var(--text-color);
            margin-top: 10px;
        }

        .mode-toggle { position: fixed; top: 10px; right: 10px; font-size: 8px; }
        h1 { font-size: 18px; }
        h3 { font-size: 10px; }
    </style>
</head>
<body class="container">

    <button class="mode-toggle" onclick="document.body.classList.toggle('dark-mode')">MODE</button>

    <div class="header">
        <h1> Tasks </h1>
        <h3>This is the temporary page for tasks!</h3>
    </div>

    <div class="main-content">
        <div class="createTask">
            <h1> Create Task </h1>
            <input type="text" id="titleField" placeholder="Task Name">
            <input type="text" id="descField" placeholder="Task Description">
            <input type="date" id="deadlineField">
            <input type="number" id="priorityField" placeholder="Priority (1 = Highest)">
            <button id="submitTask">Create Task</button>
        </div>
    </div>

    <div class="footer">
        <h1> Current Tasks </h1>
        <p id="currTasks"></p>
    </div>

    <script src="https://googleapis.com"></script>
    <script src="./app.js"></script>
    <script src="./GroupProject/app.js"></script> 
</body>
</html>


<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./app.js"></script>
<script src="./GroupProject/app.js"></script> 
<!-- the two app.js references are to make sure it works both locally and on github -->
</body>
</html>
