<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css"> 
</head>
<body>

    <div class="container">

        <div class="container text-center header">
            <h1> Tasks </h1>
            <h3>This is the temporary page for tasks!</h3>


        </div>

        <div class="main-content container">
            <h1> Create Task </h1>

            <div class="container createTask">

                <!-- <div id="taskName" class="mb-4"> -->
                <input type="text" id="titleField" class="form-control" placeholder="Task Name">
                <input type="text" id="descField" class="form-control" placeholder="Task Description">
                <input type="date" id="deadlineField" class="form-control" placeholder="Task Due Date">
                <input type="number" id="priorityField" class="form-control" placeholder="Priority (1 = Highest)">
                <button id="submitTask">Create Task</button>

            </div>


        </div>

        <div class="footer container text-center py-4 gradient-footer">
            <h1> Current Tasks </h1>
            <p id="currTasks"></p>
            <!-- the javascript will modify the contents of currTasks-->

            
        </div>

    </div>
    

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./app.js"></script>
<script src="./GroupProject/app.js"></script>
</body>
</html>
